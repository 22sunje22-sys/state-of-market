<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State of the Market — Platinumlist</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}

/* AUTH */
:root{--storm:#0A181C;--monday:#79E2FF;--hot:#FF6B6B;--gray-600:#6c757d;--white:#FFFFFF}
.login-screen{position:fixed;inset:0;background:var(--storm);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000}
.login-screen.hidden{display:none}
.login-box{background:rgba(121,226,255,0.05);border:2px solid rgba(121,226,255,0.2);border-radius:12px;padding:40px;text-align:center}
.login-logo{width:60px;height:60px;background:var(--monday);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--storm);font-size:28px;margin:0 auto 20px}
.login-title{font-size:18px;font-weight:700;color:var(--white);margin-bottom:6px}
.login-sub{color:var(--gray-600);font-size:13px;margin-bottom:24px}
.login-input{background:rgba(121,226,255,0.1);border:1px solid rgba(121,226,255,0.2);border-radius:6px;padding:12px 16px;color:var(--white);font-size:14px;width:250px;text-align:center;margin-bottom:16px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--monday)}
.login-btn{background:var(--monday);border:none;color:var(--storm);padding:12px 32px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer}
.login-btn:hover{opacity:.9}
.login-error{color:var(--hot);font-size:11px;margin-top:12px;display:none}

/* HEADER */
#dashboard{display:none}
.header{background:#1e2436;border-bottom:1px solid #2d3748;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.header-title{font-size:18px;font-weight:700;color:#fff}.header-title span{color:#f59e0b}
.header-badge{background:#f59e0b22;color:#f59e0b;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;border:1px solid #f59e0b44}
.header-right{display:flex;align-items:center;gap:12px}
.user-email{color:#94a3b8;font-size:13px}
.signout-btn{background:#1e2436;border:1px solid #374151;color:#94a3b8;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .2s}
.signout-btn:hover{border-color:#f59e0b;color:#f59e0b}
.refresh-btn{background:#f59e0b;border:none;color:#0f1117;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}

/* TABS NAV */
.nav-tabs{background:#1e2436;border-bottom:1px solid #2d3748;padding:0 24px;display:flex;gap:0}
.nav-tab{padding:12px 20px;border-bottom:2px solid transparent;color:#64748b;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-tab.active{color:#f59e0b;border-bottom-color:#f59e0b}
.nav-tab:hover:not(.active){color:#94a3b8}
.tab-pane{display:none}.tab-pane.active{display:block}

/* MAIN */
.main{padding:24px;max-width:1400px;margin:0 auto}
.date-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.date-tab{padding:7px 14px;border-radius:8px;border:1px solid #2d3748;background:#1e2436;color:#94a3b8;font-size:13px;cursor:pointer;transition:all .2s}
.date-tab.active{background:#f59e0b;border-color:#f59e0b;color:#0f1117;font-weight:600}
.date-tab:hover:not(.active){border-color:#f59e0b;color:#f59e0b}
.date-picker-input{background:#1e2436;border:1px solid #2d3748;border-radius:8px;color:#94a3b8;font-size:13px;padding:6px 10px;cursor:pointer;outline:none;transition:all .2s;height:34px}
.date-picker-input:hover,.date-picker-input:focus{border-color:#f59e0b;color:#f59e0b}
.date-picker-input::-webkit-calendar-picker-indicator{filter:invert(60%);cursor:pointer}
.date-label{color:#64748b;font-size:12px;margin-left:auto}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.kpi{background:#1e2436;border:1px solid #2d3748;border-radius:12px;padding:20px}
.kpi-label{color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:700;color:#fff}
.kpi-delta{font-size:12px;margin-top:6px}
.up{color:#34d399}.down{color:#f87171}.flat{color:#94a3b8}.warn{color:#f59e0b}

/* TABLE */
.section{background:#1e2436;border:1px solid #2d3748;border-radius:12px;overflow:hidden;margin-bottom:20px}
.section-header{padding:14px 20px;border-bottom:1px solid #2d3748;display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:14px;font-weight:600;color:#fff}
.section-sub{color:#64748b;font-size:12px}
table{width:100%;border-collapse:collapse}
th{background:#151929;color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:9px 16px;text-align:right}
th:first-child{text-align:left}
td{padding:9px 16px;border-top:1px solid #1a2235;font-size:13px;color:#e2e8f0;text-align:right}
td:first-child{text-align:left;font-weight:500}
tr:hover td{background:#1a2030}
.total-row td{font-weight:700;background:#151929;color:#f59e0b;border-top:2px solid #2d3748}
.badge-attr{background:#7c3aed22;color:#a78bfa;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}
.badge-evt{background:#0ea5e922;color:#38bdf8;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:#1e2436;border:1px solid #2d3748;border-radius:12px;padding:20px}
.chart-title{font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:14px}
.chart-wrap{position:relative;height:240px}

/* INSIGHTS */
.insights-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.insights-grid{grid-template-columns:1fr}}
.insight-card{background:#1e2436;border:1px solid #2d3748;border-radius:12px;padding:20px}
.insight-card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.insight-item{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.insight-text{font-size:13px;color:#cbd5e1;line-height:1.5}
.insight-text strong{color:#fff}
.insight-text .tag-up{color:#34d399;font-weight:600}
.insight-text .tag-down{color:#f87171;font-weight:600}
.insight-text .tag-warn{color:#f59e0b;font-weight:600}
.insight-text .tag-flat{color:#94a3b8;font-weight:500}
.insight-summary{background:#151929;border:1px solid #2d3748;border-radius:12px;padding:20px;margin-bottom:20px}
.insight-summary-title{font-size:14px;font-weight:700;color:#f59e0b;margin-bottom:12px}
.insight-summary-text{font-size:14px;color:#cbd5e1;line-height:1.7}

/* LOADING */
.loading{text-align:center;padding:60px;color:#64748b}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #2d3748;border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.last-updated{color:#64748b;font-size:12px;text-align:right;margin-bottom:14px}
/* ── SUMMARY BANNER ─────────────────────────────────────── */
.summary-banner{background:linear-gradient(135deg,#0d2028 0%,#0f2530 100%);border:1px solid rgba(121,226,255,.15);border-radius:14px;padding:20px 24px 18px;margin-bottom:20px}
.sb-header{display:flex;align-items:baseline;gap:10px;margin-bottom:16px}
.sb-title{font-size:14px;font-weight:700;color:#e2e8f0;letter-spacing:.04em;text-transform:uppercase}
.sb-subtitle{font-size:11px;color:#64748b}
.sb-row{display:flex;align-items:stretch;flex-wrap:wrap;gap:4px}
.sb-item{flex:1;min-width:160px;padding:0 20px}
.sb-item:first-child{padding-left:0}
.sb-item:last-child{padding-right:0}
.sb-divider{width:1px;background:rgba(121,226,255,.1);align-self:stretch;flex-shrink:0}
.sb-item-label{font-size:11px;color:#79e2ff;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.sb-share{font-weight:400;color:#64748b;font-size:10px;letter-spacing:0;text-transform:none}
.sb-item-value{font-size:22px;font-weight:700;color:#f1f5f9;margin-bottom:6px;letter-spacing:-.01em}
.sb-item-comps{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sb-comp-label{font-size:10px;color:#64748b}
.sb-comp-sep{color:#334155;font-size:12px}
.sb-pill{display:inline-block;font-size:11px;font-weight:700;border-radius:4px;padding:1px 6px}
.sb-up{background:rgba(16,185,129,.15);color:#10b981}
.sb-down{background:rgba(239,68,68,.15);color:#ef4444}
.sb-flat{background:rgba(100,116,139,.15);color:#94a3b8}
@media(max-width:640px){.sb-row{gap:14px 0}.sb-divider{display:none}.sb-item{padding:0;min-width:140px}}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">P</div>
    <div class="login-title">State of the Market</div>
    <div class="login-sub">Enter password to continue</div>
    <input type="password" class="login-input" id="password-input" placeholder="Password" onkeypress="if(event.key==='Enter')checkPassword()">
    <br>
    <button class="login-btn" onclick="checkPassword()">Login</button>
    <div class="login-error" id="login-error">Wrong password!</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Platinum<span>list</span> <span style="font-size:14px;font-weight:500;color:#94a3b8">State of the Market</span></div>
      <div class="header-badge">LIVE</div>
    </div>
    <div class="header-right">
      <span class="user-email" id="user-email-display"></span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <!-- TAB NAV -->
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab('market',this)">📊 Market Overview</div>
    <div class="nav-tab" onclick="switchTab('insights',this)">💡 Insights</div>
  </div>

  <div class="main">
    <!-- DATE PICKER (shared) -->
    <div class="date-tabs">
      <button class="date-tab" onclick="selectDate(this,0)">Today</button>
      <button class="date-tab active" onclick="selectDate(this,1)">Yesterday</button>
      <button class="date-tab" onclick="selectDate(this,7)">-7 days</button>
      <button class="date-tab" onclick="selectDate(this,30)">-30 days</button>
      <input type="date" id="date-picker" class="date-picker-input" onchange="selectCustomDate(this.value)" title="Pick a custom date">
      <span class="date-label" id="date-label"></span>
    </div>
    <div id="last-updated" class="last-updated"></div>
    <div id="content-loading" class="loading" style="display:none"><div class="spinner"></div><br>Loading…</div>

    <!-- MARKET TAB -->
    <div class="tab-pane active" id="tab-market">
      <div id="summary-banner"></div>
      <div id="kpi-row"></div>
      <div id="chart-section"></div>
      <div id="table-section"></div>
    </div>

    <!-- INSIGHTS TAB -->
    <div class="tab-pane" id="tab-insights">
      <div id="insights-content"><div class="loading"><div class="spinner"></div><br>Loading insights…</div></div>
    </div>
  </div>
</div>

<script>

const CURRENCY_MARKET = {AED:'UAE 🇦🇪',SAR:'Saudi Arabia 🇸🇦',QAR:'Qatar 🇶🇦',BHD:'Bahrain 🇧🇭',GBP:'United Kingdom 🇬🇧',EUR:'Europe 🇪🇺',OMR:'Oman 🇴🇲',USD:'International 🌐',TRY:'Turkey 🇹🇷'};
const MARKET_SHORT = {AED:'UAE',SAR:'Saudi',QAR:'Qatar',BHD:'Bahrain',GBP:'UK',EUR:'Europe',OMR:'Oman',USD:'Intl',TRY:'Turkey'};
const MARKET_ORDER = ['AED','SAR','QAR','BHD','GBP','EUR','OMR','USD','TRY'];
const SYM = {AED:'AED',SAR:'SAR',QAR:'QAR',BHD:'BHD',GBP:'£',EUR:'€',OMR:'OMR',USD:'$',TRY:'₺'};
const TO_AED = {AED:1,SAR:0.98,QAR:1.03,BHD:9.97,GBP:4.77,EUR:3.9,OMR:9.82,USD:3.67,TRY:0.1};

let currentOffset = 1, userEmail = '', charts = {};
let currData = {}, yoyData = {}, prevWeekData = {};
let currentDate = '', customDate = null;
let activeTab = 'market';

// ─── AUTH ────────────────────────────────────────────────────────────────────
function checkPassword() {
  const input = document.getElementById('password-input').value;
  if (input === 'platinumlist2024') {
    sessionStorage.setItem('auth','1');
    enterDashboard();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('password-input').value = '';
  }
}
function signOut() { sessionStorage.removeItem('auth'); location.reload(); }
function enterDashboard() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  activeTab = name;
  if (name === 'insights' && Object.keys(currData).length > 0) renderInsights();
}

// ─── DATE ────────────────────────────────────────────────────────────────────
function getTargetDate(offset) {
  const d = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Dubai'}));
  d.setDate(d.getDate() - offset);
  return d.toISOString().split('T')[0];
}
function addDays(dateStr, n) { const d = new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function getYoY(dateStr) { const d = new Date(dateStr+'T00:00:00'); d.setFullYear(d.getFullYear()-1); return d.toISOString().split('T')[0]; }
function fmtDateLong(s) { return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtDateShort(s) { return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }

function selectDate(el, offset) {
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentOffset = offset;
  customDate = null;
  document.getElementById('date-picker').value = '';
  loadData();
}

function selectCustomDate(val) {
  if (!val) return;
  customDate = val;
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  loadData();
}

// ─── DATA FETCH ──────────────────────────────────────────────────────────────
async function loadData() {
  const date = customDate || getTargetDate(currentOffset);
  const yoy = getYoY(date);
  const prevWeek = addDays(date, -7);
  currentDate = date;
  document.getElementById('date-label').textContent = fmtDateLong(date);
  showLoading(true);
  const [c, y, w] = await Promise.all([fetchRows(date), fetchRows(yoy), fetchRows(prevWeek)]);
  currData = c; yoyData = y; prevWeekData = w;
  showLoading(false);
  const now = new Date().toLocaleString('en-GB',{timeZone:'Asia/Dubai',hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-updated').textContent = `Last refreshed: ${now} Dubai time`;
  renderMarket();
  if (activeTab === 'insights') renderInsights();
}

function showLoading(show) {
  if (show) {
    document.getElementById('kpi-row').innerHTML = '';
    document.getElementById('chart-section').innerHTML = '';
    document.getElementById('table-section').innerHTML = '';
    document.getElementById('insights-content').innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading insights…</div>';
  }
}

async function fetchRows(date) {
  try {
    const res = await fetch(`/api/data?date=${date}`);
    if (!res.ok) return {};
    const data = await res.json();
    const agg = {};
    for (const r of data) {
      if (!agg[r.currency]) agg[r.currency] = {};
      if (!agg[r.currency][r.category]) agg[r.currency][r.category] = {rev:0, txn:0};
      agg[r.currency][r.category].rev += parseFloat(r.revenue)||0;
      agg[r.currency][r.category].txn += parseInt(r.transactions)||0;
    }
    return agg;
  } catch(e) { return {}; }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getAED(d, cur, cat) { return (d[cur]?.[cat]?.rev || 0) * (TO_AED[cur]||1); }
function getTotalAED(d) { let t=0; for (const c in d) for (const k in d[c]) t += d[c][k].rev*(TO_AED[c]||1); return t; }
function getTxn(d) { let t=0; for (const c in d) for (const k in d[c]) t += d[c][k].txn; return t; }
function getCatAED(d, cat) { let t=0; for (const c in d) t += getAED(d,c,cat); return t; }
function getMarketAED(d, cur) { return getAED(d,cur,'Attractions')+getAED(d,cur,'Events'); }
function getMarketRev(d, cur) { return (d[cur]?.Attractions?.rev||0)+(d[cur]?.Events?.rev||0); }
function pct(a,b) { return (!b||b===0) ? null : (a-b)/b*100; }
function fmtPct(p, short) {
  if (p===null) return '<span class="flat">—</span>';
  const cls = p>0?'up':p<0?'down':'flat';
  const icon = p>0?'▲':p<0?'▼':'';
  const s = short ? '' : (p>0?'+':'');
  return `<span class="${cls}">${icon}${s}${Math.abs(p).toFixed(1)}%</span>`;
}
function fmtRev(n, cur) {
  if (!n) return cur?`${SYM[cur]||cur} 0`:'0';
  const s = cur?SYM[cur]||cur:'';
  if (n>=1e6) return `${s} ${(n/1e6).toFixed(2)}M`;
  if (n>=1e3) return `${s} ${(n/1e3).toFixed(1)}K`;
  return `${s} ${n.toFixed(0)}`;
}
function fmtAED(n) { return fmtRev(n,'AED'); }
function hasAny(d) { return Object.keys(d).length > 0; }

// ─── SUMMARY BANNER ──────────────────────────────────────────────────────────
function renderSummaryBanner() {
  const el = document.getElementById('summary-banner');
  if (!el) return;
  if (!hasAny(currData)) { el.innerHTML = ''; return; }
  const totalAED    = getTotalAED(currData);
  const weekAED     = getTotalAED(prevWeekData);
  const yoyAED      = getTotalAED(yoyData);
  const attrAED     = getCatAED(currData, 'Attractions');
  const evtAED      = getCatAED(currData, 'Events');
  const weekAttrAED = getCatAED(prevWeekData, 'Attractions');
  const weekEvtAED  = getCatAED(prevWeekData, 'Events');
  const yoyAttrAED  = getCatAED(yoyData, 'Attractions');
  const yoyEvtAED   = getCatAED(yoyData, 'Events');
  const attrShare   = totalAED > 0 ? (attrAED / totalAED * 100).toFixed(0) : 0;
  const evtShare    = totalAED > 0 ? (evtAED  / totalAED * 100).toFixed(0) : 0;
  const topMarket = MARKET_ORDER.reduce((best, cur) => {
    return getMarketAED(currData, cur) > getMarketAED(currData, best || '') ? cur : (best || cur);
  }, null);
  function pill(p) {
    if (p === null) return `<span class="sb-pill sb-flat">no data</span>`;
    const dir = p > 0 ? 'up' : p < 0 ? 'down' : 'flat';
    const icon = p > 0 ? '▲' : p < 0 ? '▼' : '';
    return `<span class="sb-pill sb-${dir}">${icon}${p >= 0 ? '+' : ''}${p.toFixed(1)}%</span>`;
  }
  const wowRev  = pct(totalAED, weekAED);
  const yoyRev  = pct(totalAED, yoyAED);
  const wowAttr = pct(attrAED, weekAttrAED);
  const yoyAttr = pct(attrAED, yoyAttrAED);
  const wowEvt  = pct(evtAED, weekEvtAED);
  const yoyEvt  = pct(evtAED, yoyEvtAED);
  const weekDate = addDays(currentDate, -7);
  const yoyDate  = getYoY(currentDate);
  function dayFmt(s) { return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
  el.innerHTML = `<div class="summary-banner">
    <div class="sb-header">
      <span class="sb-title">📋 Summary — ${fmtDateShort(currentDate)}</span>
      <span class="sb-subtitle">vs same day last week &amp; last year</span>
    </div>
    <div class="sb-row">
      <div class="sb-item">
        <div class="sb-item-label">Total Revenue</div>
        <div class="sb-item-value">${fmtAED(totalAED)}</div>
        <div class="sb-item-comps">
          <span class="sb-comp-label">WoW (${dayFmt(weekDate)})</span>${pill(wowRev)}
          <span class="sb-comp-sep">·</span>
          <span class="sb-comp-label">YoY (${dayFmt(yoyDate)})</span>${pill(yoyRev)}
        </div>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-item">
        <div class="sb-item-label">🎡 Attractions <span class="sb-share">${attrShare}%</span></div>
        <div class="sb-item-value">${fmtAED(attrAED)}</div>
        <div class="sb-item-comps">
          <span class="sb-comp-label">WoW</span>${pill(wowAttr)}
          <span class="sb-comp-sep">·</span>
          <span class="sb-comp-label">YoY</span>${pill(yoyAttr)}
        </div>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-item">
        <div class="sb-item-label">🎵 Events <span class="sb-share">${evtShare}%</span></div>
        <div class="sb-item-value">${fmtAED(evtAED)}</div>
        <div class="sb-item-comps">
          <span class="sb-comp-label">WoW</span>${pill(wowEvt)}
          <span class="sb-comp-sep">·</span>
          <span class="sb-comp-label">YoY</span>${pill(yoyEvt)}
        </div>
      </div>
      ${topMarket ? `<div class="sb-divider"></div>
      <div class="sb-item">
        <div class="sb-item-label">🏆 Top Market</div>
        <div class="sb-item-value">${MARKET_SHORT[topMarket]}</div>
        <div class="sb-item-comps"><span class="sb-comp-label">${(getMarketAED(currData,topMarket)/totalAED*100).toFixed(0)}% of total</span> · ${fmtAED(getMarketAED(currData,topMarket))}</div>
      </div>` : ''}
    </div>
  </div>`;
}

// ─── RENDER MARKET ───────────────────────────────────────────────────────────
function renderMarket() {
  if (!hasAny(currData)) {
    document.getElementById('summary-banner').innerHTML = '';
    document.getElementById('kpi-row').innerHTML = `<div class="loading"><div style="font-size:36px;margin-bottom:12px">📭</div><div style="color:#94a3b8">No data for ${fmtDateShort(currentDate)}</div><div style="color:#64748b;font-size:12px;margin-top:6px">Data fetched daily at 7 AM Dubai time via GA4</div></div>`;
    document.getElementById('chart-section').innerHTML = '';
    document.getElementById('table-section').innerHTML = '';
    return;
  }
  renderSummaryBanner();
  renderKPIs();
  renderCharts();
  renderTable();
}

function renderKPIs() {
  const totalAED = getTotalAED(currData), wowAED = getTotalAED(prevWeekData), yoyAED = getTotalAED(yoyData);
  const txn = getTxn(currData), wowTxn = getTxn(prevWeekData);
  const attrAED = getCatAED(currData,'Attractions'), wowAttrAED = getCatAED(prevWeekData,'Attractions');
  const evtAED = getCatAED(currData,'Events'), wowEvtAED = getCatAED(prevWeekData,'Events');
  const attrShare = totalAED>0 ? (attrAED/totalAED*100).toFixed(0) : 0;
  document.getElementById('kpi-row').innerHTML = `<div class="kpi-row">
    <div class="kpi"><div class="kpi-label">Total Revenue (AED eq.)</div><div class="kpi-value">${fmtAED(totalAED)}</div>
      <div class="kpi-delta">vs WoW: ${fmtPct(pct(totalAED,wowAED))} &nbsp;·&nbsp; vs YoY: ${fmtPct(pct(totalAED,yoyAED))}</div></div>
    <div class="kpi"><div class="kpi-label">Transactions</div><div class="kpi-value">${txn.toLocaleString()}</div>
      <div class="kpi-delta">vs WoW: ${fmtPct(pct(txn,wowTxn))}</div></div>
    <div class="kpi"><div class="kpi-label">Attractions <span style="font-size:10px;color:#64748b">${attrShare}% of total</span></div><div class="kpi-value">${fmtAED(attrAED)}</div>
      <div class="kpi-delta">vs WoW: ${fmtPct(pct(attrAED,wowAttrAED))}</div></div>
    <div class="kpi"><div class="kpi-label">Events <span style="font-size:10px;color:#64748b">${100-attrShare}% of total</span></div><div class="kpi-value">${fmtAED(evtAED)}</div>
      <div class="kpi-delta">vs WoW: ${fmtPct(pct(evtAED,wowEvtAED))}</div></div>
  </div>`;
}

function renderCharts() {
  const markets = MARKET_ORDER.filter(c => currData[c] || prevWeekData[c]);
  const labels = markets.map(c => MARKET_SHORT[c]||c);
  document.getElementById('chart-section').innerHTML = `<div class="chart-grid">
    <div class="chart-card"><div class="chart-title">Revenue by Market (AED) — Today vs Prev Week</div><div class="chart-wrap"><canvas id="ch-market"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Attractions vs Events Split</div><div class="chart-wrap"><canvas id="ch-split"></canvas></div></div>
  </div>`;
  setTimeout(() => {
    Object.values(charts).forEach(c=>c.destroy()); charts={};
    const opts = { responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1a2235'}},
              y:{ticks:{color:'#64748b',font:{size:10},callback:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v},grid:{color:'#1a2235'}}}};
    charts.market = new Chart(document.getElementById('ch-market'),{type:'bar',
      data:{labels,datasets:[
        {label:'Selected',data:markets.map(c=>getMarketAED(currData,c)),backgroundColor:'#f59e0b',borderRadius:4},
        {label:'Prev Week',data:markets.map(c=>getMarketAED(prevWeekData,c)),backgroundColor:'#2d3748',borderRadius:4}
      ]},options:{...opts}});
    charts.split = new Chart(document.getElementById('ch-split'),{type:'bar',
      data:{labels,datasets:[
        {label:'Attractions',data:markets.map(c=>getAED(currData,c,'Attractions')),backgroundColor:'#7c3aed',borderRadius:4},
        {label:'Events',data:markets.map(c=>getAED(currData,c,'Events')),backgroundColor:'#0ea5e9',borderRadius:4}
      ]},options:{...opts,scales:{...opts.scales,x:{...opts.scales.x,stacked:true},y:{...opts.scales.y,stacked:true}}}});
  },0);
}

function renderTable() {
  let rows='', grandRev=0, grandTxn=0, grandAttr=0, grandEvt=0;
  const hasYoY = hasAny(yoyData);
  for (const cur of MARKET_ORDER) {
    if (!currData[cur] && !prevWeekData[cur]) continue;
    const attrR = currData[cur]?.Attractions?.rev||0;
    const evtR = currData[cur]?.Events?.rev||0;
    const total = attrR+evtR;
    const txn = (currData[cur]?.Attractions?.txn||0)+(currData[cur]?.Events?.txn||0);
    const wowTotal = getMarketRev(prevWeekData,cur);
    const yoyTotal = getMarketRev(yoyData,cur);
    const ap = total>0?(attrR/total*100).toFixed(0):0;
    const ep = total>0?(evtR/total*100).toFixed(0):0;
    grandRev+=total; grandTxn+=txn; grandAttr+=attrR; grandEvt+=evtR;
    rows+=`<tr>
      <td>${CURRENCY_MARKET[cur]||cur}</td>
      <td>${fmtRev(attrR,cur)} <small style="color:#64748b">${ap}%</small></td>
      <td>${fmtRev(evtR,cur)} <small style="color:#64748b">${ep}%</small></td>
      <td><strong>${fmtRev(total,cur)}</strong></td>
      <td>${txn.toLocaleString()}</td>
      <td>${fmtPct(pct(total,wowTotal))}</td>
      ${hasYoY ? `<td>${fmtPct(pct(total,yoyTotal))}</td>` : ''}
    </tr>`;
  }
  const gap = grandRev>0?(grandAttr/grandRev*100).toFixed(0):0;
  document.getElementById('table-section').innerHTML = `<div class="section">
    <div class="section-header"><div>
      <div class="section-title">Market Breakdown</div>
      <div class="section-sub">Revenue split by market · Attractions vs Events · vs prev week${hasYoY ? ' &amp; YoY' : ''}</div>
    </div></div>
    <table><thead><tr>
      <th>Market</th><th><span class="badge-attr">Attractions</span></th><th><span class="badge-evt">Events</span></th>
      <th>Total (local)</th><th>Transactions</th><th>vs WoW</th>${hasYoY ? '<th>vs YoY</th>' : ''}
    </tr></thead><tbody>
    ${rows}
    <tr class="total-row">
      <td>TOTAL</td>
      <td>${gap}% attr</td><td>${100-gap}% evt</td>
      <td>${grandRev>=1e6?(grandRev/1e6).toFixed(2)+'M':grandRev>=1e3?(grandRev/1e3).toFixed(1)+'K':grandRev.toFixed(0)} (mixed)</td>
      <td>${grandTxn.toLocaleString()}</td><td${hasYoY ? ' colspan="2"' : ''}></td>
    </tr></tbody></table>
  </div>`;
}

// ─── RENDER INSIGHTS ─────────────────────────────────────────────────────────
function renderInsights() {
  if (!hasAny(currData)) {
    document.getElementById('insights-content').innerHTML = '<div class="loading"><div style="font-size:36px;margin-bottom:12px">📭</div><div style="color:#94a3b8">No data to analyse</div></div>';
    return;
  }

  const totalAED = getTotalAED(currData), wowAED = getTotalAED(prevWeekData), yoyAED = getTotalAED(yoyData);
  const attrAED = getCatAED(currData,'Attractions'), evtAED = getCatAED(currData,'Events');
  const wowAttrAED = getCatAED(prevWeekData,'Attractions'), wowEvtAED = getCatAED(prevWeekData,'Events');
  const yoyAttrAED = getCatAED(yoyData,'Attractions'), yoyEvtAED = getCatAED(yoyData,'Events');
  const attrShare = totalAED>0?(attrAED/totalAED*100).toFixed(0):0;
  const evtShare = totalAED>0?(evtAED/totalAED*100).toFixed(0):0;

  const totalWoW = pct(totalAED, wowAED);
  const totalYoY = pct(totalAED, yoyAED);
  const attrWoW = pct(attrAED, wowAttrAED);
  const evtWoW = pct(evtAED, wowEvtAED);

  // Market-level analysis
  const marketWinners = [], marketLosers = [];
  for (const cur of MARKET_ORDER) {
    if (!currData[cur]) continue;
    const rev = getMarketAED(currData, cur);
    const wow = getMarketAED(prevWeekData, cur);
    const p = pct(rev, wow);
    if (p !== null) {
      if (p >= 10) marketWinners.push({cur, p, rev});
      else if (p <= -10) marketLosers.push({cur, p, rev});
    }
  }
  marketWinners.sort((a,b)=>b.p-a.p);
  marketLosers.sort((a,b)=>a.p-b.p);

  // Top performing market by revenue (today)
  let topMarket = null, topRev = 0;
  for (const cur of MARKET_ORDER) {
    const r = getMarketAED(currData, cur);
    if (r > topRev) { topRev = r; topMarket = cur; }
  }

  // UAE attr vs evt breakdown
  const uaeAttr = getAED(currData,'AED','Attractions');
  const uaeEvt = getAED(currData,'AED','Events');
  const uaeTotal = uaeAttr + uaeEvt;
  const wowUaeAttr = getAED(prevWeekData,'AED','Attractions');
  const wowUaeEvt = getAED(prevWeekData,'AED','Events');

  // Generate headline
  function headlineSentence() {
    if (totalWoW === null) return `Total revenue stands at <strong>${fmtAED(totalAED)}</strong> (no prior week data for comparison).`;
    const dir = totalWoW > 0 ? 'up' : totalWoW < 0 ? 'down' : 'flat';
    let sent = `Total revenue is <strong>${fmtAED(totalAED)}</strong> — <span class="tag-${dir==='up'?'up':'down'}">${Math.abs(totalWoW).toFixed(1)}% ${dir==='up'?'higher':'lower'}</span> vs the same day last week`;
    if (yoyAED > 0) { const ydir = totalYoY > 0 ? 'up' : 'down'; sent += ` and <span class="tag-${ydir==='up'?'up':'down'}">${Math.abs(totalYoY).toFixed(1)}% YoY</span>`; }
    return sent + '.';
  }

  function tagDelta(p) {
    if (p===null) return '<span class="tag-flat">no data</span>';
    if (p>0) return `<span class="tag-up">+${p.toFixed(1)}%</span>`;
    if (p<0) return `<span class="tag-down">${p.toFixed(1)}%</span>`;
    return '<span class="tag-flat">flat</span>';
  }

  // HEADLINE SUMMARY
  const summaryHTML = `<div class="insight-summary">
    <div class="insight-summary-title">📊 Daily Market Summary — ${fmtDateShort(currentDate)}</div>
    <div class="insight-summary-text">
      ${headlineSentence()}
      ${topMarket ? ` <strong>${MARKET_SHORT[topMarket]}</strong> is the top-revenue market at <strong>${fmtAED(getMarketAED(currData,topMarket))}</strong>.` : ''}
      Attractions account for <strong>${attrShare}%</strong> of revenue (${fmtAED(attrAED)}),
      Events for <strong>${evtShare}%</strong> (${fmtAED(evtAED)}).
      ${attrWoW!==null ? `Attractions are <span class="tag-${attrWoW>=0?'up':'down'}">${attrWoW>=0?'+':''}${attrWoW.toFixed(1)}%</span> and Events <span class="tag-${evtWoW>=0?'up':'down'}">${evtWoW>=0?'+':''}${evtWoW.toFixed(1)}%</span> vs prev week.` : ''}
    </div>
  </div>`;

  // MARKET MOVERS
  let moversHTML = '';
  if (marketWinners.length || marketLosers.length) {
    let items = '';
    for (const {cur,p} of marketWinners.slice(0,4)) {
      const attr = getAED(currData,cur,'Attractions'), evt = getAED(currData,cur,'Events');
      const driver = attr>evt ? 'Attractions-led' : 'Events-led';
      items += `<div class="insight-item"><span class="insight-icon">🟢</span><div class="insight-text">
        <strong>${CURRENCY_MARKET[cur]}</strong> — <span class="tag-up">+${p.toFixed(1)}%</span> vs prev week · ${driver} · Total <strong>${fmtAED(getMarketAED(currData,cur))}</strong>
      </div></div>`;
    }
    for (const {cur,p} of marketLosers.slice(0,4)) {
      items += `<div class="insight-item"><span class="insight-icon">🔴</span><div class="insight-text">
        <strong>${CURRENCY_MARKET[cur]}</strong> — <span class="tag-down">${p.toFixed(1)}%</span> vs prev week · Total <strong>${fmtAED(getMarketAED(currData,cur))}</strong>
      </div></div>`;
    }
    moversHTML = `<div class="insight-card">
      <div class="insight-card-title">📈 Market Movers <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#94a3b8;font-size:11px">vs prev week</span></div>
      ${items || '<div class="insight-item"><span class="insight-icon">⚪</span><div class="insight-text">All markets within ±10% of prev week.</div></div>'}
    </div>`;
  }

  // UAE DEEP-DIVE
  const uaeWoW = pct(uaeTotal, wowUaeAttr+wowUaeEvt);
  const uaeAttrWoW = pct(uaeAttr, wowUaeAttr);
  const uaeEvtWoW = pct(uaeEvt, wowUaeEvt);
  let uaeItems = `
    <div class="insight-item"><span class="insight-icon">💰</span><div class="insight-text">UAE total: <strong>${fmtAED(uaeTotal)}</strong> · ${tagDelta(uaeWoW)} vs prev week</div></div>
    <div class="insight-item"><span class="insight-icon">🎡</span><div class="insight-text">Attractions: <strong>${fmtAED(uaeAttr)}</strong> (${uaeTotal>0?(uaeAttr/uaeTotal*100).toFixed(0):0}%) · ${tagDelta(uaeAttrWoW)} vs prev week</div></div>
    <div class="insight-item"><span class="insight-icon">🎵</span><div class="insight-text">Events: <strong>${fmtAED(uaeEvt)}</strong> (${uaeTotal>0?(uaeEvt/uaeTotal*100).toFixed(0):0}%) · ${tagDelta(uaeEvtWoW)} vs prev week</div></div>`;
  if (uaeWoW!==null && Math.abs(uaeWoW)>15) {
    uaeItems += `<div class="insight-item"><span class="insight-icon">⚡</span><div class="insight-text">UAE swing of <strong>${Math.abs(uaeWoW).toFixed(1)}%</strong> — ${Math.abs(uaeWoW)>30?'significant move, check event calendar':'worth monitoring'}</div></div>`;
  }
  const uaeHTML = `<div class="insight-card">
    <div class="insight-card-title">🇦🇪 UAE Deep-Dive</div>
    ${uaeItems}
  </div>`;

  // SPLIT ANALYSIS
  let splitItems = `
    <div class="insight-item"><span class="insight-icon">🎡</span><div class="insight-text">Attractions: <strong>${fmtAED(attrAED)}</strong> · ${attrShare}% of revenue · ${tagDelta(attrWoW)} WoW${yoyAttrAED>0?' · '+tagDelta(pct(attrAED,yoyAttrAED))+' YoY':''}</div></div>
    <div class="insight-item"><span class="insight-icon">🎵</span><div class="insight-text">Events: <strong>${fmtAED(evtAED)}</strong> · ${evtShare}% of revenue · ${tagDelta(evtWoW)} WoW${yoyEvtAED>0?' · '+tagDelta(pct(evtAED,yoyEvtAED))+' YoY':''}</div></div>`;
  if (attrAED > evtAED*1.5) splitItems += `<div class="insight-item"><span class="insight-icon">⚠️</span><div class="insight-text">Attractions are driving the majority — revenue heavily dependent on attraction bookings.</div></div>`;
  else if (evtAED > attrAED*1.5) splitItems += `<div class="insight-item"><span class="insight-icon">⚠️</span><div class="insight-text">Events are driving the majority — revenue heavily dependent on upcoming events.</div></div>`;
  else splitItems += `<div class="insight-item"><span class="insight-icon">✅</span><div class="insight-text">Healthy balance between Attractions and Events revenue.</div></div>`;
  const splitHTML = `<div class="insight-card">
    <div class="insight-card-title">⚡ Attractions vs Events</div>
    ${splitItems}
  </div>`;

  // GEO SPREAD
  const activeMkts = MARKET_ORDER.filter(c => getMarketAED(currData,c) > 0).length;
  const topShare = topMarket ? (getMarketAED(currData,topMarket)/totalAED*100).toFixed(0) : 0;
  let geoItems = `
    <div class="insight-item"><span class="insight-icon">🌍</span><div class="insight-text"><strong>${activeMkts}</strong> of ${MARKET_ORDER.length} markets active today</div></div>
    ${topMarket ? `<div class="insight-item"><span class="insight-icon">🏆</span><div class="insight-text"><strong>${MARKET_SHORT[topMarket]}</strong> is the largest market at ${topShare}% of total revenue</div></div>` : ''}`;
  if (topShare > 70) geoItems += `<div class="insight-item"><span class="insight-icon">⚠️</span><div class="insight-text">High concentration: ${MARKET_SHORT[topMarket]} accounts for over 70% — revenue sensitive to UAE demand fluctuations.</div></div>`;
  else if (topShare < 40) geoItems += `<div class="insight-item"><span class="insight-icon">✅</span><div class="insight-text">Good geographic diversification — no single market exceeds 40%.</div></div>`;
  const geoHTML = `<div class="insight-card">
    <div class="insight-card-title">🌍 Geographic Spread</div>
    ${geoItems}
  </div>`;

  document.getElementById('insights-content').innerHTML = summaryHTML + `<div class="insights-grid">${moversHTML}${uaeHTML}${splitHTML}${geoHTML}</div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('auth') === '1') enterDashboard();
});
</script>
